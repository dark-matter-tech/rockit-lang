name: Integration

on:
  repository_dispatch:
    types: [integration-test]
  schedule:
    - cron: '0 6 * * *'  # nightly at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Full-stack integration
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git clang-15 curl libssl-dev pkg-config jq
          ln -sf /usr/bin/clang-15 /usr/bin/clang
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests
        id: tests
        run: bash scripts/test-all.sh
        env:
          GIT_HOST: https://github.com
          GIT_ORG: dark-matter-tech

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: |
            /tmp/stage2.rokb
            /tmp/stage3.rokb
            /tmp/integration-results.json
          retention-days: 90

      - name: Report status to triggering repo
        if: always() && github.event_name == 'repository_dispatch'
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          REF="${{ github.event.client_payload.ref }}"
          if [ -z "$REPO" ] || [ -z "$REF" ]; then
            echo "No repo/ref in payload — skipping status callback"
            exit 0
          fi

          SHA=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            "https://api.github.com/repos/dark-matter-tech/${REPO}/commits/${REF}" \
            | jq -r '.sha // empty')

          if [ -z "$SHA" ]; then
            echo "Could not resolve SHA for ${REPO}@${REF}"
            exit 0
          fi

          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            STATE="success"
            DESC="All integration tests passed"
          else
            STATE="failure"
            DESC="Integration tests failed — check run log"
          fi

          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            "https://api.github.com/repos/dark-matter-tech/${REPO}/statuses/${SHA}" \
            -d "{\"state\":\"${STATE}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"description\":\"${DESC}\",\"context\":\"integration / full-stack\"}"

          echo "Posted ${STATE} status to ${REPO}@${SHA}"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Create or update failure issues
        if: always() && steps.tests.outcome == 'failure'
        shell: bash
        run: |
          RESULTS="/tmp/integration-results.json"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          API="https://api.github.com"
          REPO="dark-matter-tech/rockit-lang"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EVENT_NAME="${{ github.event_name }}"
          PAYLOAD_REPO="${{ github.event.client_payload.repo }}"
          PAYLOAD_REF="${{ github.event.client_payload.ref }}"

          # Determine trigger context
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            TRIGGER="dispatch from ${PAYLOAD_REPO}@${PAYLOAD_REF}"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            TRIGGER="nightly cron"
          else
            TRIGGER="manual"
          fi

          # Ensure labels exist
          for label in integration-failure automated; do
            curl -s -X POST -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/labels" \
              -d "{\"name\":\"${label}\",\"color\":\"d73a4a\"}" > /dev/null 2>&1 || true
          done

          # Fallback if results JSON missing
          if [ ! -f "$RESULTS" ]; then
            echo '{"suites":[],"manifest":{}}' > "$RESULTS"
          fi

          # Process each failed suite
          jq -c '.suites[] | select(.status == "FAIL")' "$RESULTS" | while read -r suite; do
            SUITE_NAME=$(echo "$suite" | jq -r '.name')
            SUITE_ERROR=$(echo "$suite" | jq -r '.error // "No details captured"')
            SAFE_NAME=$(echo "$SUITE_NAME" | sed 's/[^a-zA-Z0-9_-]//g')

            # Ensure suite label
            curl -s -X POST -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/labels" \
              -d "{\"name\":\"suite:${SAFE_NAME}\",\"color\":\"e99695\"}" > /dev/null 2>&1 || true

            # Search for existing open issue
            EXISTING=$(curl -s -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/issues?labels=integration-failure,suite:${SAFE_NAME}&state=open&per_page=1" \
              | jq -r '.[0].number // empty')

            # Build manifest one-liner
            MANIFEST_LINE="booster@$(jq -r '.manifest.booster' "$RESULTS") compiler@$(jq -r '.manifest.compiler' "$RESULTS") fuel@$(jq -r '.manifest.fuel' "$RESULTS") stdlib@$(jq -r '.manifest.stdlib' "$RESULTS")"

            if [ -n "$EXISTING" ]; then
              # Comment on existing issue
              BODY=$(printf "### Failure recurrence — %s\n\nTrigger: %s\nRun: [#%s](%s)\n\n\`\`\`\n%s\n\`\`\`\n\nBuild manifest: %s" \
                "$NOW" "$TRIGGER" "$GITHUB_RUN_NUMBER" "$RUN_URL" "$SUITE_ERROR" "$MANIFEST_LINE")

              jq -n --arg body "$BODY" '{"body": $body}' | \
                curl -s -X POST -H "Authorization: Bearer ${GH_PAT}" \
                  -H "Accept: application/vnd.github+json" \
                  "$API/repos/$REPO/issues/${EXISTING}/comments" \
                  -d @- > /dev/null

              echo "Updated issue #${EXISTING} for suite ${SUITE_NAME}"
            else
              # Create new issue
              TITLE="Integration failure: ${SUITE_NAME}"
              BODY=$(printf "## Integration Test Failure: %s\n\nTrigger: %s\nRun: [#%s](%s)\nDate: %s\n\n### Error Details\n\n\`\`\`\n%s\n\`\`\`\n\n### Build Manifest\n\n| Component | Value |\n|-----------|-------|\n| booster | %s |\n| compiler | %s |\n| fuel | %s |\n| stdlib | %s |\n| probe | %s |\n| triple | %s |\n\n---\n_Automatically created by the integration test workflow._" \
                "$SUITE_NAME" "$TRIGGER" "$GITHUB_RUN_NUMBER" "$RUN_URL" "$NOW" "$SUITE_ERROR" \
                "$(jq -r '.manifest.booster' "$RESULTS")" \
                "$(jq -r '.manifest.compiler' "$RESULTS")" \
                "$(jq -r '.manifest.fuel' "$RESULTS")" \
                "$(jq -r '.manifest.stdlib' "$RESULTS")" \
                "$(jq -r '.manifest.probe' "$RESULTS")" \
                "$(jq -r '.manifest.triple' "$RESULTS")")

              jq -n \
                --arg title "$TITLE" \
                --arg body "$BODY" \
                --argjson labels '["integration-failure","suite:'"${SAFE_NAME}"'","automated"]' \
                '{title: $title, body: $body, labels: $labels}' | \
                curl -s -X POST -H "Authorization: Bearer ${GH_PAT}" \
                  -H "Accept: application/vnd.github+json" \
                  "$API/repos/$REPO/issues" \
                  -d @- > /dev/null

              echo "Created issue for suite ${SUITE_NAME}"
            fi
          done
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Mark recovered suites
        if: always() && steps.tests.outcome == 'success'
        shell: bash
        run: |
          API="https://api.github.com"
          REPO="dark-matter-tech/rockit-lang"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          for suite in compiler-integration bootstrap-verification fuel-cli stdlib-modules; do
            EXISTING=$(curl -s -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "$API/repos/$REPO/issues?labels=integration-failure,suite:${suite}&state=open&per_page=1" \
              | jq -r '.[0].number // empty')

            if [ -n "$EXISTING" ]; then
              BODY=$(printf "Suite \`%s\` passed in run [#%s](%s). This issue may be resolved." \
                "$suite" "$GITHUB_RUN_NUMBER" "$RUN_URL")

              jq -n --arg body "$BODY" '{"body": $body}' | \
                curl -s -X POST -H "Authorization: Bearer ${GH_PAT}" \
                  -H "Accept: application/vnd.github+json" \
                  "$API/repos/$REPO/issues/${EXISTING}/comments" \
                  -d @- > /dev/null

              echo "Commented recovery on issue #${EXISTING} for suite ${suite}"
            fi
          done
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
