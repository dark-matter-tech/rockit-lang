name: Release

on:
  push:
    branches: [staging]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
            container: swift:5.10.1-jammy
            archive_ext: tar.gz
            triple: x86_64-unknown-linux-gnu
          - platform: macos-arm64
            runner: macos-14
            container: ""
            archive_ext: tar.gz
            triple: arm64-apple-macosx
          - platform: macos-x86_64
            runner: macos-14
            container: ""
            archive_ext: tar.gz
            triple: x86_64-apple-macosx
          - platform: windows-x86_64
            runner: windows-latest
            container: ""
            archive_ext: zip
            triple: x86_64-unknown-windows-msvc

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || null }}
    continue-on-error: ${{ matrix.platform == 'windows-x86_64' || matrix.platform == 'macos-x86_64' }}
    defaults:
      run:
        shell: ${{ matrix.platform == 'windows-x86_64' && 'pwsh' || 'bash' }}

    steps:
      # -- Linux --
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          apt-get update && apt-get install -y git clang-15 curl jq libssl-dev pkg-config gnupg
          ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Checkout (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # -- macOS --
      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install openssl@3 pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"

      - name: Checkout (macOS/Windows)
        if: matrix.platform != 'linux-x86_64'
        uses: actions/checkout@v4

      # -- Windows --
      - name: Install Swift (Windows)
        if: matrix.platform == 'windows-x86_64'
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.10.1-release
          tag: 5.10.1-RELEASE

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-x86_64'
        run: |
          choco install openssl -y
          choco install jq -y

      # -- Common build --
      - name: Set version and temp dir
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
          # Use RUNNER_TEMP on Windows, /tmp on Unix
          if [ "${{ matrix.platform }}" = "windows-x86_64" ]; then
            TMPBASE="$(cygpath "$RUNNER_TEMP")/rockit-build"
          else
            TMPBASE="/tmp"
          fi
          mkdir -p "$TMPBASE"
          echo "TMPBASE=$TMPBASE" >> "$GITHUB_ENV"
        shell: bash

      - name: Clone compiler
        run: |
          git clone --depth 1 --recurse-submodules --branch staging \
            https://github.com/dark-matter-tech/rockit-compiler.git "$TMPBASE/compiler"
        shell: bash

      - name: Clone and build Stage 0
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/dark-matter-tech/rockit-booster.git "$TMPBASE/booster"
          cd "$TMPBASE/booster" && swift build -c release
        shell: bash

      - name: Build Stage 1
        run: |
          cd $TMPBASE/compiler
          bash src/build.sh
          $TMPBASE/booster/.build/release/rockit build-native src/command.rok
        shell: bash

      - name: Determine version
        run: |
          DETECTED=$($TMPBASE/compiler/src/command version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          if [ -n "$DETECTED" ]; then
            echo "VERSION=${DETECTED}" >> "$GITHUB_ENV"
            echo "TAG=v${DETECTED}" >> "$GITHUB_ENV"
            echo "Detected version: ${DETECTED}"
          elif [ "$VERSION" = "staging" ] || [ -z "$VERSION" ]; then
            echo "VERSION=0.3.0" >> "$GITHUB_ENV"
            echo "TAG=v0.3.0" >> "$GITHUB_ENV"
            echo "Using default version: 0.3.0"
          else
            echo "Using ref version: ${VERSION}"
          fi
        shell: bash

      - name: Build runtime
        run: cd $TMPBASE/compiler && bash runtime/rockit/build.sh
        shell: bash

      - name: Clone and build Fuel
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/dark-matter-tech/rockit-fuel.git $TMPBASE/fuel || true
          if [ -d $TMPBASE/fuel ]; then
            $TMPBASE/compiler/src/command build-native $TMPBASE/fuel/src/fuel.rok \
              -o $TMPBASE/fuel/fuel --runtime-path $TMPBASE/compiler/runtime/rockit_runtime.o \
              --target-triple ${{ matrix.triple }}
          fi
        shell: bash

      - name: Build LSP
        run: |
          git clone --depth 1 --branch master \
            https://github.com/dark-matter-tech/rockit-lsp.git "$TMPBASE/lsp"
          cd "$TMPBASE/lsp"
          export ROCKIT_COMPILER_DIR="$TMPBASE/compiler"
          export ROCKIT_RUNTIME_DIR="$TMPBASE/compiler/runtime"
          export PATH="$TMPBASE/booster/.build/release:$PATH"
          bash build.sh
        shell: bash

      - name: Package archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          ARCHIVE="rockit-${VERSION}-${{ matrix.platform }}.tar.gz"
          STAGING="dist/rockit-${VERSION}-${{ matrix.platform }}/rockit"
          mkdir -p "${STAGING}/bin" "${STAGING}/share/rockit"
          cp $TMPBASE/compiler/src/command "${STAGING}/bin/rockit"
          chmod +x "${STAGING}/bin/rockit"
          if [ -f $TMPBASE/fuel/fuel ]; then
            cp $TMPBASE/fuel/fuel "${STAGING}/bin/fuel"
            chmod +x "${STAGING}/bin/fuel"
          fi
          if [ -f $TMPBASE/lsp/rockit-lsp ]; then
            cp $TMPBASE/lsp/rockit-lsp "${STAGING}/bin/rockit-lsp"
            chmod +x "${STAGING}/bin/rockit-lsp"
          fi
          cp $TMPBASE/compiler/runtime/rockit_runtime.o "${STAGING}/share/rockit/"
          cp -r $TMPBASE/compiler/launchpad "${STAGING}/share/rockit/stdlib"
          cd dist && tar -czf "${ARCHIVE}" "rockit-${VERSION}-${{ matrix.platform }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
        shell: bash

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        run: |
          $archive = "rockit-$env:VERSION-${{ matrix.platform }}.zip"
          $staging = "dist/rockit-$env:VERSION-${{ matrix.platform }}/rockit"
          New-Item -ItemType Directory -Force -Path "$staging/bin"
          New-Item -ItemType Directory -Force -Path "$staging/share/rockit"
          Copy-Item "$TMPBASE/compiler/src/command.exe" "$staging/bin/rockit.exe" -ErrorAction SilentlyContinue
          Copy-Item "$TMPBASE/compiler/src/command" "$staging/bin/rockit.exe" -ErrorAction SilentlyContinue
          if (Test-Path "$TMPBASE/fuel/fuel.exe") { Copy-Item "$TMPBASE/fuel/fuel.exe" "$staging/bin/fuel.exe" }
          if (Test-Path "$TMPBASE/lsp/rockit-lsp.exe") { Copy-Item "$TMPBASE/lsp/rockit-lsp.exe" "$staging/bin/rockit-lsp.exe" }
          if (Test-Path "$TMPBASE/compiler/runtime/rockit_runtime.o") {
            Copy-Item "$TMPBASE/compiler/runtime/rockit_runtime.o" "$staging/share/rockit/"
          }
          if (Test-Path "$TMPBASE/compiler/launchpad") {
            Copy-Item -Recurse "$TMPBASE/compiler/launchpad" "$staging/share/rockit/stdlib"
          }
          Compress-Archive -Path "dist/rockit-$env:VERSION-${{ matrix.platform }}/*" -DestinationPath "dist/$archive"
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rockit-${{ matrix.platform }}
          path: dist/rockit-${{ env.VERSION }}-${{ matrix.platform }}.${{ matrix.archive_ext }}

  create-release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Detect version from artifacts
        run: |
          TARBALL=$(ls artifacts/rockit-linux-x86_64/rockit-*-linux-x86_64.tar.gz 2>/dev/null | head -1)
          if [ -n "$TARBALL" ]; then
            VERSION=$(echo "$TARBALL" | sed 's/.*rockit-\(.*\)-linux-x86_64.tar.gz/\1/')
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="0.3.0"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "Detected version: ${VERSION}"

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub release
        run: |
          FILES=""
          for artifact_dir in artifacts/rockit-*; do
            for file in "$artifact_dir"/*; do
              [ -f "$file" ] && FILES="$FILES $file"
            done
          done

          # Delete existing release if present
          gh release delete "${TAG}" --repo "${GITHUB_REPOSITORY}" --yes 2>/dev/null || true

          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Rockit ${TAG}" \
            --notes "$(cat <<NOTES
          ## Rockit ${TAG}

          ### What's Included

          - **rockit** — The Rockit compiler (self-hosted)
          - **fuel** — The Rockit package manager
          - **rockit-lsp** — Language server (written in Rockit)
          - **stdlib** — Standard library (15 modules)
          - **rockit_runtime.o** — Prebuilt runtime

          ### Platforms

          | Platform | Archive |
          |----------|---------|
          | Linux x86_64 | \`rockit-${VERSION}-linux-x86_64.tar.gz\` |
          | macOS arm64 | \`rockit-${VERSION}-macos-arm64.tar.gz\` |
          | macOS x86_64 | \`rockit-${VERSION}-macos-x86_64.tar.gz\` |
          | Windows x86_64 | \`rockit-${VERSION}-windows-x86_64.zip\` |

          ### Install

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/dark-matter-tech/rockit-lang/develop/scripts/install.sh | bash
          \`\`\`
          NOTES
          )" \
            $FILES
        env:
          GH_TOKEN: ${{ github.token }}

  push-docker:
    name: Push Docker toolchain image
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rockit-linux-x86_64
          path: artifacts/

      - name: Prepare Docker context
        run: |
          TARBALL=$(ls artifacts/rockit-*-linux-x86_64.tar.gz | head -1)
          tar -xzf "$TARBALL" -C artifacts/
          DIR=$(ls -d artifacts/rockit-*-linux-x86_64 | head -1)
          VERSION=$(echo "$DIR" | sed 's/.*rockit-\(.*\)-linux-x86_64/\1/')
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          mkdir -p rockit-toolchain/bin rockit-toolchain/share/rockit
          cp "${DIR}/rockit/bin/"* rockit-toolchain/bin/
          cp "${DIR}/rockit/share/rockit/rockit_runtime.o" rockit-toolchain/share/rockit/
          cp -r "${DIR}/rockit/share/rockit/stdlib" rockit-toolchain/share/rockit/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -f Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/rockit-toolchain:${TAG} \
                                     -t ${{ secrets.DOCKERHUB_USERNAME }}/rockit-toolchain:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rockit-toolchain:${TAG}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rockit-toolchain:latest
