name: Release

on:
  push:
    branches: [staging]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git libssl-dev pkg-config curl jq gnupg
          if ! command -v clang > /dev/null 2>&1; then
            apt-get install -y clang-15
            ln -sf /usr/bin/clang-15 /usr/bin/clang
          fi

      - name: Set version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Clone compiler
        run: |
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITEA_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --recurse-submodules --branch staging \
            "${GITHUB_SERVER_URL}/Dark-Matter/rockit-compiler.git" /tmp/compiler
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Clone and build Stage 0 (bootstrap compiler)
        run: |
          git clone --depth 1 --branch develop \
            "${GITHUB_SERVER_URL}/Dark-Matter/rockit-booster.git" /tmp/booster
          cd /tmp/booster && swift build -c release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Build Stage 1
        run: |
          cd /tmp/compiler
          bash src/build.sh
          /tmp/booster/.build/release/rockit build-native src/command.rok

      - name: Determine version
        run: |
          VERSION=$(/tmp/compiler/src/command version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "Detected version: ${VERSION}"

      - name: Build runtime
        run: cd /tmp/compiler && bash runtime/rockit/build.sh

      - name: Build Fuel
        run: |
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITEA_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch develop \
            "${GITHUB_SERVER_URL}/Dark-Matter/rockit-fuel.git" /tmp/fuel
          /tmp/compiler/src/command build-native /tmp/fuel/src/fuel.rok \
            -o /tmp/fuel/fuel --runtime-path /tmp/compiler/runtime/rockit_runtime.o
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Bootstrap verification
        run: |
          cd /tmp/compiler
          TRIPLE="x86_64-unknown-linux-gnu"

          echo "==> Stage 1 -> Stage 2 (native)..."
          src/command build-native src/command.rok \
            -o /tmp/stage2 --runtime-path runtime/rockit_runtime.o --target-triple $TRIPLE

          echo "==> Stage 2 -> Stage 3 (bytecode comparison)..."
          src/command compile src/command.rok -o /tmp/stage2.rokb
          /tmp/stage2 compile src/command.rok -o /tmp/stage3.rokb

          if diff /tmp/stage2.rokb /tmp/stage3.rokb > /dev/null 2>&1; then
            echo "==> Fixed point verified: Stage 2 == Stage 3"
          else
            echo "==> FAILED: Stage 2 != Stage 3"
            exit 1
          fi

      - name: Import GPG signing key
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d/ -f2)" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Package and sign
        run: |
          ARCHIVE="rockit-${VERSION}-linux-x86_64"
          STAGING="dist/${ARCHIVE}/rockit"
          mkdir -p "${STAGING}/bin" "${STAGING}/share/rockit"
          cp /tmp/compiler/src/command "${STAGING}/bin/rockit"
          cp /tmp/fuel/fuel "${STAGING}/bin/fuel"
          chmod +x "${STAGING}/bin/rockit" "${STAGING}/bin/fuel"
          cp /tmp/compiler/runtime/rockit_runtime.o "${STAGING}/share/rockit/"
          cp -r /tmp/compiler/launchpad "${STAGING}/share/rockit/stdlib"

          if [ -n "${GPG_KEY_ID:-}" ]; then
            bash scripts/sign.sh "${STAGING}/bin/rockit" gpg || true
            bash scripts/sign.sh "${STAGING}/bin/fuel" gpg || true
          fi

          cd "${STAGING}"
          find . -type f ! -name "MANIFEST.sha256" ! -name "*.sig" | sort | while read -r f; do
            hash=$(shasum -a 256 "$f" | awk '{print $1}')
            echo "sha256:${hash}  ${f#./}" >> MANIFEST.sha256
          done
          cd ../../..

          if [ -n "${GPG_KEY_ID:-}" ]; then
            export GPG_KEY_ID
            export GPG_PASSPHRASE="${GPG_PASSPHRASE:-}"
            bash scripts/sign.sh "${STAGING}/MANIFEST.sha256" manifest || true
          fi

          cd dist && tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create release
        run: |
          API="${GITHUB_SERVER_URL}/api/v1"

          # Check if release already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")

          if [ "$STATUS" = "200" ]; then
            echo "Release ${TAG} already exists — skipping."
            exit 0
          fi

          # Create tag if needed
          TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${API}/repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}")
          if [ "$TAG_STATUS" != "200" ]; then
            SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            if [ -n "$SHA" ]; then
              curl -s -X POST \
                -H "Authorization: token ${GITEA_TOKEN}" \
                -H "Content-Type: application/json" \
                "${API}/repos/${GITHUB_REPOSITORY}/tags" \
                -d "{\"tag_name\": \"${TAG}\", \"target\": \"${SHA}\"}"
            fi
          fi

          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Rockit ${TAG}\", \"body\": \"Release ${TAG} of the Rockit toolchain.\"}" | jq -r '.id')

          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${ARCHIVE}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}"

          echo "Release ${TAG} published"
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Mirror release to GitHub
        if: env.GH_PAT != ''
        run: |
          GH_RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GH_PAT}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/dark-matter-tech/rockit-lang/releases" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Rockit ${TAG}\", \"body\": \"Release ${TAG} of the Rockit toolchain.\"}" | jq -r '.id')

          if [ -n "$GH_RELEASE_ID" ] && [ "$GH_RELEASE_ID" != "null" ]; then
            curl -s -X POST \
              -H "Authorization: token ${GH_PAT}" \
              -H "Content-Type: application/gzip" \
              --data-binary "@dist/${ARCHIVE}" \
              "https://uploads.github.com/repos/dark-matter-tech/rockit-lang/releases/${GH_RELEASE_ID}/assets?name=${ARCHIVE}"
            echo "Mirrored release ${TAG} to GitHub"
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Build and push Docker toolchain image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          STAGING="dist/rockit-${VERSION}-linux-x86_64/rockit"
          mkdir -p rockit-toolchain/bin rockit-toolchain/share/rockit
          cp "${STAGING}/bin/rockit" rockit-toolchain/bin/
          cp "${STAGING}/bin/fuel" rockit-toolchain/bin/
          cp "${STAGING}/share/rockit/rockit_runtime.o" rockit-toolchain/share/rockit/
          cp -r "${STAGING}/share/rockit/stdlib" rockit-toolchain/share/rockit/

          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker build -f Dockerfile -t "${DOCKERHUB_USERNAME}/rockit-toolchain:${TAG}" \
                                     -t "${DOCKERHUB_USERNAME}/rockit-toolchain:latest" .
          docker push "${DOCKERHUB_USERNAME}/rockit-toolchain:${TAG}"
          docker push "${DOCKERHUB_USERNAME}/rockit-toolchain:latest"
          echo "Pushed rockit-toolchain:${TAG} and :latest to Docker Hub"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
