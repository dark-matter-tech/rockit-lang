name: Integration

on:
  repository_dispatch:
    types: [integration-test]
  schedule:
    - cron: '0 6 * * *'  # nightly at 06:00 UTC
  workflow_dispatch:

jobs:
  integration:
    name: Full-stack integration
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git clang-15 curl libssl-dev pkg-config
          ln -sf /usr/bin/clang-15 /usr/bin/clang
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Run integration tests
        run: bash scripts/test-all.sh
        env:
          GIT_HOST: https://rustygits.com
          GIT_ORG: Dark-Matter
          GIT_TOKEN: ${{ secrets.GH_MIRROR_PAT }}
